<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rule-Based AI Chatbot</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel" aria-label="Rule-Based AI Chatbot">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Rule-Based AI</p>
            <h1>ChatBot</h1>
          </div>
          <span class="status">Online</span>
        </header>

        <div id="messages" class="messages" aria-live="polite">
          <article class="message bot">
            <div class="bubble">
              Hello! Ask me for a joke, a riddle, a fun fact, simple math, advice, or type help.
            </div>
          </article>
        </div>

        <form id="chat-form" class="composer">
          <input
            id="message-input"
            name="message"
            type="text"
            autocomplete="off"
            placeholder="Type your message..."
            aria-label="Message"
            required
          >
          <button type="submit">Send</button>
        </form>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
